name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Syntax check (py_compile)
        run: |
          python -m py_compile main.py
          python -m py_compile one_click_pipeline.py
          python -m py_compile api_client.py
          python -m py_compile glossary.py
          python -m py_compile prompts.py
          python -m py_compile translation_db.py
          python -m py_compile tl_parser.py
          python -m py_compile font_patch.py
          python -m py_compile file_processor/__init__.py
          python -m py_compile file_processor/splitter.py
          python -m py_compile file_processor/patcher.py
          python -m py_compile file_processor/checker.py
          python -m py_compile file_processor/validator.py
          python -m py_compile direct_translator.py
          python -m py_compile retranslator.py
          python -m py_compile tl_translator.py
          python -m py_compile translation_utils.py
          python -m py_compile config.py
          python -m py_compile analyze_writeback_failures.py
          python -m py_compile review_generator.py
          python -m py_compile lang_config.py
          python -m py_compile screen_translator.py

      - name: Run unit tests (test_all.py)
        run: python test_all.py

      - name: Run smoke tests (tests/smoke_test.py)
        run: python tests/smoke_test.py

      - name: Run tl_parser self-tests
        run: python -c "import tl_parser; tl_parser._run_self_tests()"

      - name: Run screen_translator self-tests
        run: python -c "import screen_translator; screen_translator._run_self_tests()"

      - name: Verify zero third-party dependencies
        run: |
          python -c "
          import ast, sys, importlib.util, pathlib
          stdlib = set(sys.stdlib_module_names) if hasattr(sys, 'stdlib_module_names') else set()
          errors = []
          for py in pathlib.Path('.').glob('**/*.py'):
              if 'output' in py.parts or '.git' in py.parts or 'renpy_upgrade_tool' in py.name:
                  continue
              try:
                  tree = ast.parse(py.read_text(encoding='utf-8'))
              except SyntaxError:
                  continue
              for node in ast.walk(tree):
                  if isinstance(node, ast.Import):
                      names = [a.name.split('.')[0] for a in node.names]
                  elif isinstance(node, ast.ImportFrom) and node.module and node.level == 0:
                      names = [node.module.split('.')[0]]
                  else:
                      continue
                  for name in names:
                      if name.startswith('_'):
                          continue
                      local = pathlib.Path(name + '.py').exists() or pathlib.Path(name).is_dir()
                      is_stdlib = (name in stdlib) if stdlib else (importlib.util.find_spec(name) is not None)
                      if not local and not is_stdlib:
                          errors.append(f'{py}: {name}')
          if errors:
              print('Third-party imports detected:')
              for e in errors:
                  print(f'  {e}')
              sys.exit(1)
          print('Zero-dependency check passed')
          "

      - name: Type check (informational)
        run: |
          pip install mypy --break-system-packages 2>/dev/null || pip install mypy
          mypy --ignore-missing-imports --no-error-summary translation_utils.py config.py file_processor/ api_client.py glossary.py translation_db.py || true
        continue-on-error: true

      - name: Integration test (dry-run)
        run: python main.py --game-dir tests/tl_priority_mini/game --provider xai --dry-run
